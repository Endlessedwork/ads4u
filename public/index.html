<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ads4U Panel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: { 50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 300: '#93c5fd', 400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 800: '#1e40af', 900: '#1e3a8a' },
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-50 min-h-screen">
  <div id="loginView" class="hidden min-h-screen flex items-center justify-center">
    <div class="bg-white rounded-2xl shadow-lg p-8 max-w-sm w-full text-center">
      <h1 class="text-2xl font-bold text-gray-800 mb-2">Ads4U Panel</h1>
      <p class="text-gray-500 mb-6" data-i18n="login.subtitle">Sign in to continue</p>
      <a href="/auth/google" class="inline-flex items-center gap-3 bg-white border border-gray-300 rounded-lg px-6 py-3 text-gray-700 font-medium hover:bg-gray-50 hover:shadow transition">
        <svg class="w-5 h-5" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        <span data-i18n="login.google_button">Sign in with Google</span>
      </a>
      <div class="mt-4">
        <button id="langToggleLogin" class="text-sm text-gray-400 hover:text-gray-600">TH / EN</button>
      </div>
    </div>
  </div>

  <div id="appView" class="hidden">
    <div class="md:hidden bg-white border-b px-4 py-3 flex items-center justify-between">
      <button id="menuToggle" class="text-gray-600">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <span class="font-bold text-gray-800">Ads4U</span>
      <div id="mobileUserAvatar"></div>
    </div>
    <div class="flex">
      <aside id="sidebar" class="hidden md:flex flex-col w-64 bg-white border-r min-h-screen fixed">
        <div class="p-4 border-b">
          <h1 class="text-xl font-bold text-primary-600">Ads4U Panel</h1>
        </div>
        <nav class="flex-1 p-4 space-y-1" id="sidebarNav"></nav>
        <div class="p-4 border-t">
          <div class="flex items-center gap-3" id="userInfo"></div>
        </div>
      </aside>
      <main class="flex-1 md:ml-64 p-6">
        <div id="content"></div>
      </main>
    </div>
  </div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
