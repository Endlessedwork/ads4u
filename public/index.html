<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ads4U Panel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
          },
          colors: {
            primary: {
              50: '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe', 300: '#a5b4fc',
              400: '#818cf8', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca',
              800: '#3730a3', 900: '#312e81', 950: '#1e1b4b'
            },
          }
        }
      }
    }
  </script>
  <style>
    * { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    .tabular-nums { font-variant-numeric: tabular-nums; }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }
    .sidebar-link { transition: background-color 200ms ease, color 200ms ease; }
    .sidebar-link:hover { background-color: rgb(238 242 255); }
    .sidebar-link.active { background-color: rgb(224 231 255); color: rgb(67 56 202); }
    .skeleton { background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900 antialiased">

  <!-- Login view -->
  <div id="loginView" class="hidden min-h-screen flex items-center justify-center bg-gradient-to-br from-primary-50 via-white to-slate-50">
    <div class="bg-white rounded-2xl shadow-xl shadow-slate-200/50 border border-slate-100 p-10 max-w-sm w-full text-center">
      <div class="w-12 h-12 bg-primary-600 rounded-xl flex items-center justify-center mx-auto mb-5">
        <svg class="w-7 h-7 text-white" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 3v11.25A2.25 2.25 0 0 0 6 16.5h2.25M3.75 3h-1.5m1.5 0h16.5m0 0h1.5m-1.5 0v11.25A2.25 2.25 0 0 1 18 16.5h-2.25m-7.5 0h7.5m-7.5 0-1 3m8.5-3 1 3m0 0 .5 1.5m-.5-1.5h-9.5m0 0-.5 1.5M9 11.25v1.5M12 9v3.75m3-6v6" /></svg>
      </div>
      <h1 class="text-2xl font-bold text-slate-800 mb-1">Ads4U Panel</h1>
      <p class="text-slate-500 mb-8 text-sm" data-i18n="login.subtitle">Sign in to continue</p>
      <a href="auth/google"
         class="inline-flex items-center justify-center gap-3 w-full bg-white border border-slate-200 rounded-xl px-6 py-3 text-slate-700 font-medium hover:bg-slate-50 hover:border-slate-300 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:ring-offset-2 transition-all duration-200 cursor-pointer">
        <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        <span data-i18n="login.google_button">Sign in with Google</span>
      </a>
      <div class="mt-6">
        <button id="langToggleLogin" class="text-xs text-slate-400 hover:text-slate-600 transition-colors duration-200 cursor-pointer focus:outline-none focus:ring-2 focus:ring-primary-500 rounded px-2 py-1">TH / EN</button>
      </div>
    </div>
  </div>

  <!-- App view -->
  <div id="appView" class="hidden">
    <!-- Mobile header -->
    <header class="md:hidden bg-white border-b border-slate-200 px-4 py-3 flex items-center justify-between sticky top-0 z-30">
      <button id="menuToggle" class="p-2 -ml-2 rounded-lg text-slate-500 hover:bg-slate-100 hover:text-slate-700 transition-colors duration-200 cursor-pointer focus:outline-none focus:ring-2 focus:ring-primary-500" aria-label="Toggle menu">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" /></svg>
      </button>
      <span class="font-semibold text-slate-800 text-sm">Ads4U Panel</span>
      <div id="mobileUserAvatar"></div>
    </header>

    <!-- Mobile sidebar overlay -->
    <div id="sidebarOverlay" class="hidden fixed inset-0 bg-slate-900/20 z-40 md:hidden" aria-hidden="true"></div>

    <div class="flex min-h-screen">
      <!-- Sidebar -->
      <aside id="sidebar" class="hidden md:flex flex-col w-64 bg-white border-r border-slate-200 min-h-screen fixed z-50 transition-transform duration-200">
        <div class="px-5 py-5 border-b border-slate-100">
          <div class="flex items-center gap-2.5">
            <div class="w-8 h-8 bg-primary-600 rounded-lg flex items-center justify-center flex-shrink-0">
              <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 3v11.25A2.25 2.25 0 0 0 6 16.5h2.25M3.75 3h-1.5m1.5 0h16.5m0 0h1.5m-1.5 0v11.25A2.25 2.25 0 0 1 18 16.5h-2.25m-7.5 0h7.5m-7.5 0-1 3m8.5-3 1 3m0 0 .5 1.5m-.5-1.5h-9.5m0 0-.5 1.5M9 11.25v1.5M12 9v3.75m3-6v6" /></svg>
            </div>
            <span class="text-base font-bold text-slate-800">Ads4U Panel</span>
          </div>
        </div>
        <nav class="flex-1 px-3 py-4 space-y-0.5 overflow-y-auto" id="sidebarNav">
          <!-- Filled by app.js -->
        </nav>
        <div class="px-4 py-4 border-t border-slate-100">
          <div class="flex items-center gap-3" id="userInfo">
            <!-- Filled by app.js -->
          </div>
        </div>
      </aside>

      <!-- Main content -->
      <main class="flex-1 md:ml-64 min-h-screen">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-6 sm:py-8">
          <div id="content">
            <!-- Filled by page modules -->
          </div>
        </div>
      </main>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
